*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px}
header{background:var(--green);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:6;box-shadow:0 2px 6px rgba(0,0,0,.15)}

.wrap{max-width:760px;margin:0 auto;padding:12px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin:2px 2px 10px;align-items:center}
.legend i{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:4px;border:1px solid #b9c7b9}

.bedshape{cursor:pointer}.bedshape:active{opacity:.8}
.blab{font-size:15px;font-weight:700;fill:var(--green-d);pointer-events:none}.blab.sm{font-size:12px}
.inlab{fill:#a7a7a1}
.strip{margin-top:14px}.strip h2{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--green-d);margin:0 0 8px;font-weight:700}

.chip b{color:var(--green-d)}.chip small{color:var(--muted);display:block;font-size:11px;margin-top:1px}
#status{font-size:12px;color:var(--muted);text-align:center;padding:6px}
.sheet{position:fixed;inset:0;z-index:20;display:none}.sheet.open{display:block}
.sheet .scrim{position:absolute;inset:0;background:rgba(20,30,24,.45)}
.panel{position:absolute;left:0;right:0;bottom:0;max-height:88vh;background:var(--bg);border-radius:18px 18px 0 0;overflow:auto;padding-bottom:24px;max-width:760px;margin:0 auto}
.phead{position:sticky;top:0;background:var(--green);color:#fff;padding:14px 16px;display:flex;gap:10px}
.phead .x{margin-left:auto;font-size:22px;cursor:pointer;background:none;border:none;color:#fff}
.phead .ttl{font-size:18px;font-weight:700}.phead .st{font-size:12px;opacity:.85;margin-top:2px}
.plist{padding:12px 16px}
.skurow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px;cursor:pointer}
.skurow .nm{flex:1;min-width:0}.skurow .nm b{font-size:14px;display:block}.skurow .nm small{font-size:12px;color:var(--muted)}
.badge{font-size:13px;font-weight:700;padding:4px 9px;border-radius:8px;white-space:nowrap}.badge.none{background:#eef1ee;color:var(--muted);font-weight:600}
.sid{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px}
.detail{padding:14px 16px}.detail .vm{font-size:13px;color:var(--muted);margin:0}
.comp{font-size:13px;background:#f7faf6;border:1px solid var(--line);border-radius:10px;padding:10px 12px;white-space:pre-line;margin:12px 0}
.ratebtn{display:block;width:100%;text-align:center;padding:15px;border-radius:12px;background:var(--green);color:#fff;font-size:16px;font-weight:700;text-decoration:none;margin:14px 0}
.h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--green-d);font-weight:700;margin:18px 0 8px}
.pass{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px}
.pass .top{display:flex;gap:8px;font-size:13px}.pass .top b{color:var(--green-d)}.pass .top .who{color:var(--muted)}
.scores{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}.scorechip{font-size:12px;background:#f0f4f0;border-radius:7px;padding:3px 8px}
.note{font-size:13px;color:var(--muted);margin-top:7px;font-style:italic}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}.thumbs a{width:74px;height:74px;border-radius:9px;overflow:hidden;border:1px solid var(--line);display:block;background:#eee}.thumbs img{width:100%;height:100%;object-fit:cover}
