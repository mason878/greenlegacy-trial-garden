<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Green Legacy Trial Garden — Map</title>
<style>
:root{
  --green:#2E5D34;--green-d:#234727;--green-l:#5a8c61;--bg:#f4f6f3;--card:#fff;
  --ink:#23302a;--muted:#6b7a70;--line:#dfe6e0;--accent:#d3bf78;
  --bad:#c0653c;--mid:#d3a04a;--good:#4f8a52;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.4}
header{background:var(--green);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:6;box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{margin:0;font-size:18px;font-weight:700}
header .sub{font-size:12px;opacity:.85;margin-top:2px}
.bar{display:flex;gap:8px;margin-top:10px;align-items:center}
#search{flex:1;padding:10px 12px;border:none;border-radius:10px;font-size:15px;background:#ffffff;color:var(--ink)}
.count{font-size:12px;background:rgba(255,255,255,.16);padding:6px 10px;border-radius:9px;white-space:nowrap}
.wrap{max-width:900px;margin:0 auto;padding:14px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin:4px 2px 14px;align-items:center}
.legend i{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:4px;border:1px solid var(--line)}
.zone{margin-bottom:18px}
.zone h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--green-d);margin:0 0 8px;font-weight:700}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.bed{flex:1 1 84px;min-width:84px;max-width:150px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:9px 8px;cursor:pointer;transition:.08s;position:relative;overflow:hidden}
.bed:active{transform:scale(.97)}
.bed .bid{font-weight:700;font-size:13px;color:var(--green-d)}
.bed .meta{font-size:11px;color:var(--muted);margin-top:2px}
.bed .prog{height:4px;border-radius:3px;background:#e8eee8;margin-top:7px;overflow:hidden}
.bed .prog span{display:block;height:100%;background:var(--good)}
.sheet{position:fixed;inset:0;z-index:20;display:none}
.sheet.open{display:block}
.sheet .scrim{position:absolute;inset:0;background:rgba(20,30,24,.45)}
.sheet .panel{position:absolute;left:0;right:0;bottom:0;max-height:88vh;background:var(--bg);
  border-radius:18px 18px 0 0;overflow:auto;padding-bottom:24px;max-width:900px;margin:0 auto}
.phead{position:sticky;top:0;background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:flex-start;gap:10px}
.phead .x{margin-left:auto;font-size:22px;line-height:1;cursor:pointer;opacity:.9;background:none;border:none;color:#fff}
.phead .ttl{font-size:18px;font-weight:700}
.phead .st{font-size:12px;opacity:.85;margin-top:2px}
.plist{padding:12px 16px}
.skurow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:11px 12px;margin-bottom:8px;cursor:pointer}
.skurow:active{transform:scale(.99)}
.skurow .nm{flex:1;min-width:0}
.skurow .nm b{font-size:14px;display:block;color:var(--ink)}
.skurow .nm small{font-size:12px;color:var(--muted)}
.badge{font-size:13px;font-weight:700;padding:4px 9px;border-radius:8px;white-space:nowrap}
.badge.none{background:#eef1ee;color:var(--muted);font-weight:600}
.sid{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px}
.detail{padding:14px 16px}
.detail .vn{font-size:20px;font-weight:700;margin:0}
.detail .vm{font-size:13px;color:var(--muted);margin:3px 0 0}
.comp{font-size:13px;background:#f7faf6;border:1px solid var(--line);border-radius:10px;padding:10px 12px;white-space:pre-line;margin:12px 0}
.ratebtn{display:block;width:100%;text-align:center;padding:15px;border-radius:12px;background:var(--green);
  color:#fff;font-size:16px;font-weight:700;text-decoration:none;margin:14px 0;border:none;cursor:pointer}
.h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--green-d);font-weight:700;margin:18px 0 8px}
.pass{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px}
.pass .top{display:flex;align-items:center;gap:8px;font-size:13px}
.pass .top b{color:var(--green-d)} .pass .top .who{color:var(--muted)}
.pass .scores{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:12px;background:#f0f4f0;border-radius:7px;padding:3px 8px;color:var(--ink)}
.pass .note{font-size:13px;color:var(--muted);margin-top:7px;font-style:italic}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.thumbs a{width:74px;height:74px;border-radius:9px;overflow:hidden;border:1px solid var(--line);display:block;background:#eee}
.thumbs img{width:100%;height:100%;object-fit:cover}
.empty{color:var(--muted);font-size:14px;padding:6px 0}
.searchres{padding:6px 16px 0}
#status{font-size:12px;color:var(--muted);text-align:center;padding:6px}
</style>
</head>
<body>
<header>
  <h1>Green Legacy Trial Garden</h1>
  <div class="sub">Summer 2026 trial — tap a bed, then a variety</div>
  <div class="bar">
    <input id="search" placeholder="Search variety, supplier, or SKU…" autocomplete="off">
    <span class="count" id="count">—</span>
  </div>
</header>
<div class="wrap">
  <div class="legend">
    <span><i style="background:#eef1ee"></i>not rated</span>
    <span><i style="background:#cfe0cf"></i>some rated</span>
    <span><i style="background:#7faa80"></i>all rated</span>
    <span style="margin-left:auto">Avg: <i style="background:#c0653c"></i>low <i style="background:#d3a04a"></i>mid <i style="background:#4f8a52"></i>high</span>
  </div>
  <div id="map"></div>
  <div id="searchwrap" class="searchres" style="display:none"></div>
  <div id="status"></div>
</div>

<div class="sheet" id="sheet">
  <div class="scrim" onclick="closeSheet()"></div>
  <div class="panel" id="panel"></div>
</div>

","sup":"","type":"Single","comp":""}]},"layout":[{"zone":"Field rows","rows":[["Bed 11","Bed 12","Bed 13","Bed 14","Bed 15N","Bed 15S","Bed 16"],["Bed 01","Bed 02","Bed 03","Bed 04","Bed 05","Bed 06","Bed 07"]]},{"zone":"20s & 50s","rows":[["Bed 50","Bed 51","Beds 50 & 51","Bed 52","Bed 53"],["Bed 21","Bed 22","Bed 24","Bed 25"]]},{"zone":"30s","rows":[["Bed 31","Bed 32","Bed 33","Bed 34","Bed 35","Bed 36","Bed 37N"],["Beds 54 & 55"]]},{"zone":"40s","rows":[["Bed 41","Bed 42","Bed 43","Bed 44","Bed 45","Bed 46","Bed 47","Bed 48"],["Beds 56 & 57","Beds 58 & 59"]]},{"zone":"Combos, containers & baskets","rows":[["Combo #1","Combo #2","Combo #3","Combo 1","Combo 2","Combo 3","Combo 4","Combo 5","Combo 6","Combo 7","Combo 8","Combo 9","Combo 10"],["Container 1","Container 2","HB 1a","HB 1b","HB 2a","HB 2b","Leftover"]]}]};
const BEDS=DATA.beds, LAYOUT=DATA.layout;
let RATINGS={};   // sku -> [ {date,rater,V,U,F,R,avg,note,photos[]} ] newest first

function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function dispName(s){ return s.type!=="Single" ? (s.gen||s.ser||"")||"" : [s.gen,s.ser,s.col].filter(Boolean).join(" "); }
function bedLabel(b){ return b.replace(/^Beds? /,'').replace('Container','Cont. ').replace('Combo','Combo '); }
function scoreColor(a){ if(a==null) return null; return a>=4?'var(--good)':a>=3?'var(--mid)':'var(--bad)'; }
function driveThumb(url){ const m=String(url).match(/\/d\/([^/]+)/); return m?('https://drive.google.com/thumbnail?id='+m[1]+'&sz=w300'):url; }

function latestAvg(sku){ const r=RATINGS[sku]; return r&&r.length?r[0].avg:null; }

function renderMap(){
  const map=document.getElementById('map'); map.innerHTML='';
  LAYOUT.forEach(z=>{
    const zd=document.createElement('div'); zd.className='zone';
    zd.innerHTML='<h2>'+esc(z.zone)+'</h2>';
    z.rows.forEach(row=>{
      const rd=document.createElement('div'); rd.className='row';
      row.forEach(bid=>{
        const skus=BEDS[bid]||[]; const total=skus.length;
        let rated=0,sum=0,cnt=0;
        skus.forEach(s=>{const a=latestAvg(s.sku); if(a!=null){rated++; sum+=a; cnt++;}});
        const frac= total? rated/total : 0;
        const tint= rated===0 ? '#ffffff' : (rated===total ? '#e3eee3' : '#f1f6f0');
        const cell=document.createElement('div'); cell.className='bed'; cell.style.background=tint;
        cell.onclick=()=>openBed(bid);
        cell.innerHTML='<div class="bid">'+esc(bedLabel(bid))+'</div>'+
          '<div class="meta">'+total+' var · '+rated+' rated</div>'+
          '<div class="prog"><span style="width:'+Math.round(frac*100)+'%"></span></div>';
        rd.appendChild(cell);
      });
      zd.appendChild(rd);
    });
    map.appendChild(zd);
  });
  updateCount();
}

function updateCount(){
  const rated=Object.keys(RATINGS).length;
  document.getElementById('count').textContent=rated+' / 696 rated';
}

function openBed(bid){
  const skus=BEDS[bid]||[];
  const panel=document.getElementById('panel');
  let h='<div class="phead"><div><div class="ttl">'+esc(bid)+'</div>'+
        '<div class="st">'+skus.length+' varieties</div></div>'+
        '<button class="x" onclick="closeSheet()">×</button></div><div class="plist">';
  skus.forEach(s=>{
    const a=latestAvg(s.sku); const c=scoreColor(a);
    const badge= a!=null ? '<span class="badge" style="background:'+c+';color:#fff">'+a.toFixed(2)+'</span>'
                         : '<span class="badge none">rate</span>';
    h+='<div class="skurow" onclick="openSku(\''+s.sku+'\')"><div class="nm">'+
       '<span class="sid">'+s.sku+'</span><b>'+esc(dispName(s)||s.type)+'</b>'+
       '<small>'+esc([s.sup,s.type!=="Single"?s.type:""].filter(Boolean).join(" · "))+'</small></div>'+badge+'</div>';
  });
  h+='</div>';
  panel.innerHTML=h; openSheet();
}

function findSku(sku){ for(const b in BEDS){ const f=BEDS[b].find(x=>x.sku===sku); if(f) return {s:f,bed:b}; } return null; }

function openSku(sku){
  const found=findSku(sku); if(!found) return;
  const s=found.s; const hist=RATINGS[sku]||[];
  const panel=document.getElementById('panel');
  let h='<div class="phead"><div><div class="ttl">'+esc(dispName(s)||s.type)+'</div>'+
        '<div class="st">'+s.sku+' · '+esc(found.bed)+'</div></div>'+
        '<button class="x" onclick="closeSheet()">×</button></div><div class="detail">';
  h+='<p class="vm">'+esc([s.sup, s.type].filter(Boolean).join(" · "))+'</p>';
  if(s.comp) h+='<div class="comp">'+esc(s.comp)+'</div>';
  h+='<a class="ratebtn" href="rate.html?sku='+s.sku+'">Rate this variety ›</a>';
  h+='<div class="h3">Ratings ('+hist.length+')</div>';
  if(!hist.length){ h+='<div class="empty">No ratings yet. Tap “Rate this variety” to add the first.</div>'; }
  hist.forEach(p=>{
    h+='<div class="pass"><div class="top"><b>'+esc(p.date)+'</b><span class="who">· '+esc(p.rater)+'</span>';
    if(p.avg!=null) h+='<span class="badge" style="background:'+scoreColor(p.avg)+';color:#fff;margin-left:auto">'+Number(p.avg).toFixed(2)+'</span>';
    h+='</div><div class="scores"><span class="chip">VEG '+p.V+'</span><span class="chip">UNI '+p.U+'</span><span class="chip">FLO '+p.F+'</span><span class="chip">RES '+p.R+'</span></div>';
    if(p.note) h+='<div class="note">“'+esc(p.note)+'”</div>';
    if(p.photos&&p.photos.length){ h+='<div class="thumbs">'+p.photos.map(u=>'<a href="'+esc(u)+'" target="_blank"><img loading="lazy" src="'+esc(driveThumb(u))+'"></a>').join('')+'</div>'; }
    h+='</div>';
  });
  h+='</div>';
  panel.innerHTML=h; openSheet();
}

function openSheet(){ document.getElementById('sheet').classList.add('open'); document.getElementById('panel').scrollTop=0; }
function closeSheet(){ document.getElementById('sheet').classList.remove('open'); }

// search
const allSkus=[]; for(const b in BEDS){ BEDS[b].forEach(s=>allSkus.push({s,bed:b})); }
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  const sw=document.getElementById('searchwrap'); const mp=document.getElementById('map');
  if(!q){ sw.style.display='none'; mp.style.display='block'; sw.innerHTML=''; return; }
  mp.style.display='none'; sw.style.display='block';
  const hits=allSkus.filter(o=>{const s=o.s; return (s.sku+" "+s.gen+" "+s.ser+" "+s.col+" "+s.sup+" "+o.bed).toLowerCase().includes(q);}).slice(0,60);
  let h='<div class="plist">';
  if(!hits.length) h+='<div class="empty">No matches.</div>';
  hits.forEach(o=>{const s=o.s;const a=latestAvg(s.sku);const c=scoreColor(a);
    const badge=a!=null?'<span class="badge" style="background:'+c+';color:#fff">'+a.toFixed(2)+'</span>':'<span class="badge none">rate</span>';
    h+='<div class="skurow" onclick="openSku(\''+s.sku+'\')"><div class="nm"><span class="sid">'+s.sku+' · '+esc(o.bed)+'</span><b>'+esc(dispName(s)||s.type)+'</b><small>'+esc(s.sup||"")+'</small></div>'+badge+'</div>';
  });
  h+='</div>'; sw.innerHTML=h;
});

async function loadRatings(){
  const st=document.getElementById('status'); st.textContent='Loading ratings…';
  try{
    const r=await fetch(ENDPOINT+'?action=all'); const j=await r.json();
    (j.rows||[]).forEach(row=>{
      const [sku,date,rater,V,U,F,R,avg,note,photos]=row;
      (RATINGS[sku]=RATINGS[sku]||[]).push({date,rater,V,U,F,R,avg:(avg===''||avg==null?null:Number(avg)),note,
        photos:(photos?String(photos).split('\n').filter(Boolean):[])});
    });
    for(const k in RATINGS){ RATINGS[k].sort((a,b)=> (a.date<b.date?1:-1)); }
    st.textContent='';
  }catch(e){ st.textContent='Offline — showing varieties only. Pull to refresh when you have signal.'; }
  renderMap();
}
renderMap();
loadRatings();
</script>
