<!DOCTYPE html>
<html lang="en">
<head>
<script src="tg-queue.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Trial Garden Rating</title>
<style>
:root{
  --green:#2E5D34; --green-dark:#234727; --green-light:#5a8c61;
  --bg:#f4f6f3; --card:#ffffff; --ink:#23302a; --muted:#6b7a70;
  --line:#dfe6e0; --accent:#d3bf78; --bad:#c0653c; --good:#4f8a52;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:17px;line-height:1.4}
header{background:var(--green);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:5;
  box-shadow:0 2px 6px rgba(0,0,0,.15)}
header .sku{font-weight:700;font-size:15px;letter-spacing:.5px;opacity:.85}
header .name{font-size:21px;font-weight:700;margin-top:2px}
header .meta{font-size:13px;opacity:.85;margin-top:3px}
.wrap{max-width:560px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{margin:0 0 4px;font-size:15px;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px}
.card .hint{font-size:13px;color:var(--muted);margin:0 0 10px}
.comp{font-size:14px;color:var(--ink);background:#f7faf6;border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;white-space:pre-line;margin-top:8px}
.last{font-size:13px;color:var(--muted);background:#fbf8ed;border:1px dashed var(--accent);border-radius:10px;
  padding:8px 11px;margin:-2px 0 12px}
.last b{color:var(--green-dark)}
label.fld{display:block;font-size:14px;color:var(--green-dark);font-weight:600;margin:14px 0 6px}
.scale{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.scale button{padding:14px 0;border:1.5px solid var(--line);background:#fff;border-radius:11px;
  font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;transition:.08s}
.scale button .lab{display:block;font-size:9px;font-weight:600;color:var(--muted);margin-top:2px;text-transform:uppercase}
.scale button.sel{background:var(--green);border-color:var(--green);color:#fff;transform:scale(1.04)}
.scale button.sel .lab{color:#e8efe6}
select,textarea,input[type=text]{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;
  font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
textarea{min-height:64px;resize:vertical}
.photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;
  border:1.5px dashed var(--green-light);background:#f3f8f3;border-radius:11px;color:var(--green-dark);
  font-size:16px;font-weight:600;cursor:pointer}
.photo-btn input{display:none}
#thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
#thumbs .t{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
#thumbs .t img{width:100%;height:100%;object-fit:cover}
#thumbs .t span{position:absolute;top:-6px;right:-6px;background:var(--bad);color:#fff;width:22px;height:22px;
  border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.avg{text-align:center;font-size:14px;color:var(--muted);margin:6px 0 0}
.avg b{font-size:26px;color:var(--green);display:block}
.submit{position:sticky;bottom:0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--bg) 70%,transparent)}
.submit button{width:100%;max-width:560px;margin:0 auto;display:block;padding:17px;border:none;border-radius:13px;
  background:var(--green);color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(46,93,52,.3)}
.submit button:disabled{background:#9bb29f;box-shadow:none}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--green-dark);color:#fff;
  padding:22px 26px;border-radius:14px;font-size:18px;font-weight:600;z-index:30;text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,.3);display:none;max-width:80%}
.toast.show{display:block}
.err{background:#fff;border:2px solid var(--bad);color:var(--bad);border-radius:12px;padding:18px;margin:20px}
.scanbtn{display:block;text-align:center;margin:14px 0;color:var(--green);font-size:14px;text-decoration:underline}
.opt{font-weight:400;color:#888;font-size:.85em}
</style>
</head>

:{"loc":"Bed 03","type":"Single","sup":"","gen":"Zucchini","ser":"Spineless Perfection","col":"","comp":""},"GL-0681":{"loc":"Bed 03","type":"Single","sup":"","gen":"Tomato","ser":"Better Boy Plus F1","col":"","comp":""},"GL-0682":{"loc":"Bed 03","type":"Single","sup":"","gen":"Tomato","ser":"Chocolate Sprinkles F1","col":"","comp":""},"GL-0683":{"loc":"Bed 03","type":"Single","sup":"","gen":"Tomato","ser":"Heartbreaker Vita F1","col":"","comp":""},"GL-0684":{"loc":"Bed 03","type":"Single","sup":"","gen":"Lemon Balm","ser":"Limoncello","col":"","comp":""},"GL-0685":{"loc":"Bed 03","type":"Single","sup":"","gen":"Lemon Balm","ser":"Mandarina","col":"","comp":""},"GL-0686":{"loc":"Bed 03","type":"Single","sup":"","gen":"Parsley","ser":"Italian Dark Plain Leaf","col":"","comp":""},"GL-0687":{"loc":"Bed 03","type":"Single","sup":"","gen":"Pepper","ser":"Candy Cane F1","col":"Red","comp":""},"GL-0688":{"loc":"Bed 03","type":"Single","sup":"","gen":"Pepper","ser":"Longhorn F1","col":"","comp":""},"GL-0689":{"loc":"Bed 03","type":"Single","sup":"","gen":"Basil","ser":"Red Rubin","col":"","comp":""},"GL-0690":{"loc":"Bed 03","type":"Single","sup":"","gen":"Basil","ser":"Aristotle","col":"","comp":""},"GL-0691":{"loc":"Bed 03","type":"Single","sup":"","gen":"Basil","ser":"Prospera\u00ae","col":"","comp":""},"GL-0692":{"loc":"Bed 03","type":"Single","sup":"","gen":"Basil","ser":"Prospera\u00ae ","col":"Italian Large Leaf DMR","comp":""},"GL-0693":{"loc":"Bed 03","type":"Single","sup":"","gen":"Cilantro","ser":"Slow Bolting","col":"","comp":""},"GL-0694":{"loc":"Bed 03","type":"Single","sup":"","gen":"Dill","ser":"Fernleaf","col":"","comp":""},"GL-0695":{"loc":"Bed 03","type":"Single","sup":"","gen":"Beet","ser":"Bull's Blood","col":"","comp":""},"GL-0696":{"loc":"Bed 03","type":"Single","sup":"","gen":"Pepper","ser":"California Wonder 300","col":"","comp":""}};

const CRIT=[["VEG","Vegetative growth / vigor"],["UNI","Uniformity"],
            ["FLO","Flowering",true],["RES","Pest & disease resistance"]];
const REQ=["VEG","UNI","RES"];  // Flowering (FLO) is optional
const SCALE=[["0","dead"],["1","unaccept"],["2","poor"],["3","avg"],["4","good"],["5","amazing"]];
const scores={VEG:null,UNI:null,FLO:null,RES:null};
let photos=[];

function qs(k){return new URLSearchParams(location.search).get(k);}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

const id=(qs("sku")||"").toUpperCase().trim();
const rec=SKU[id];
const app=document.getElementById("app");

if(!rec){
  app.innerHTML=`<div class="err"><h2>SKU not found</h2>
   <p>The code <b>${esc(id)||"(none)"}</b> isn't in the trial list. Re-scan the label, or check the QR.</p></div>`;
}else{
  render();
}

function dispName(r){
  if(r.type!=="Single") return r.loc+" ("+r.type+")";
  return [r.gen,r.ser,r.col].filter(Boolean).join(" ");
}

function render(){
  const name=dispName(rec);
  const metaBits=[rec.loc,rec.sup].filter(Boolean).join(" · ");
  app.innerHTML=`
  <header>
    <div class="sku">${id}</div>
    <div class="name">${esc(name)}</div>
    <div class="meta">${esc(metaBits)}</div>
  </header>
  <div class="wrap">
    ${rec.comp?`<div class="card"><h2>Components</h2><div class="comp">${esc(rec.comp)}</div></div>`:""}
    <div id="lastBox"></div>
    <div class="card">
      <h2>Ratings</h2>
      <p class="hint">0 = dead · 5 = amazing. Tap one per row.</p>
      ${CRIT.map(c=>scaleRow(c[0],c[1],c[2])).join("")}
      <p class="avg">Average this pass<b id="avgOut">—</b></p>
    </div>
    <div class="card">
      <h2>Notes & Photo</h2>
      <label class="fld" for="rater">Rated by</label>
      <select id="rater"><option value="">— select —</option>${RATERS.map(r=>`<option>${esc(r)}</option>`).join("")}</select>
      <label class="fld" for="note">Notes (optional)</label>
      <textarea id="note" placeholder="Anything worth recording — reversions, splitting, damage…"></textarea>
      <label class="fld">Photos (optional)</label>
      <label class="photo-btn">📷 Add photo
        <input type="file" accept="image/*" capture="environment" id="photoIn" multiple>
      </label>
      <div id="thumbs"></div>
    </div>
  </div>
  <div class="submit"><button id="go">Submit rating</button></div>`;

  CRIT.forEach(c=>wireScale(c[0]));
  document.getElementById("photoIn").addEventListener("change",addPhotos);
  document.getElementById("go").addEventListener("click",submit);
  loadLast();
}

function scaleRow(key,label,optional){
  return `<label class="fld">${key} — ${label}${optional?' <span class="opt">(optional)</span>':''}</label>
   <div class="scale" data-k="${key}">
     ${SCALE.map(s=>`<button data-v="${s[0]}">${s[0]}<span class="lab">${s[1]}</span></button>`).join("")}
   </div>`;
}
function wireScale(key){
  const row=document.querySelector(`.scale[data-k="${key}"]`);
  row.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{
      row.querySelectorAll("button").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); scores[key]=Number(b.dataset.v); refresh();
    });
  });
}
function refresh(){
  const vals=Object.values(scores).filter(v=>v!==null);
  const avgEl=document.getElementById("avgOut");
  if(vals.length){avgEl.textContent=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);}
  else avgEl.textContent="—";
  // Allow submit with 0 ratings (photo-only). If rating at all, VEG/UNI/RES are required; Flowering is optional.
  const reqDone=REQ.every(k=>scores[k]!==null);
  document.getElementById("go").disabled = vals.length>0 && !reqDone;
}
function addPhotos(e){
  [...e.target.files].forEach(f=>{
    const url=URL.createObjectURL(f);
    photos.push({file:f,url});
  });
  e.target.value="";
  drawThumbs();
}
function drawThumbs(){
  const t=document.getElementById("thumbs");
  t.innerHTML=photos.map((p,i)=>`<div class="t"><img src="${p.url}"><span data-i="${i}">×</span></div>`).join("");
  t.querySelectorAll("span").forEach(s=>s.addEventListener("click",()=>{
    photos.splice(Number(s.dataset.i),1);drawThumbs();
  }));
}
function toast(msg,ms){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  if(ms)setTimeout(()=>t.classList.remove("show"),ms);}

async function loadLast(){
  if(!ENDPOINT)return;
  try{
    const r=await fetch(`${ENDPOINT}?action=last&sku=${id}`);
    const j=await r.json();
    if(j&&j.found){
      document.getElementById("lastBox").innerHTML=
       `<div class="last">Last rated <b>${esc(j.date)}</b> by ${esc(j.rater)} —
        VEG ${j.VEG} · UNI ${j.UNI} · FLO ${j.FLO} · RES ${j.RES} (avg <b>${j.Avg}</b>)</div>`;
    }
  }catch(e){/* offline — skip */}
}

function compressPhoto(f){return new Promise(res=>{
  const img=new Image(),url=URL.createObjectURL(f);
  img.onload=()=>{
    const MAX=1600,s=Math.min(1,MAX/Math.max(img.width,img.height));
    const c=document.createElement("canvas");
    c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    URL.revokeObjectURL(url);
    res(c.toDataURL("image/jpeg",.72).split(",")[1]);
  };
  img.src=url;
});}

async function submit(){
  const btn=document.getElementById("go");btn.disabled=true;
  const ratedVals=Object.values(scores).filter(v=>v!==null);
  const hasRatings=REQ.every(k=>scores[k]!==null);  // Flowering optional
  const avg=hasRatings?(ratedVals.reduce((a,b)=>a+b,0)/ratedVals.length).toFixed(2):null;
  const payload={
    sku:id,loc:rec.loc,type:rec.type,sup:rec.sup,gen:rec.gen,ser:rec.ser,col:rec.col,
    date:new Date().toISOString(),rater:document.getElementById("rater").value,
    VEG:scores.VEG,UNI:scores.UNI,FLO:scores.FLO,RES:scores.RES,Avg:avg,
    notes:document.getElementById("note").value
  };
  try{
    payload.photos=await Promise.all(photos.map(async p=>({name:p.file.name,data:await compressPhoto(p.file)})));
  }catch(e){payload.photos=[];}
  if(ENDPOINT){
    fetch(ENDPOINT,{method:"POST",body:JSON.stringify(payload),
      headers:{"Content-Type":"text/plain;charset=utf-8"}}).catch(()=>{});
  }else{
    console.log("RATING (no endpoint set):",payload);
  }
  toast("✓ "+id+" saved"+(avg?"\nAvg "+avg:""),0);
  setTimeout(()=>{
    window.location.href='index.html?bed='+encodeURIComponent(rec.loc);
  },1400);
}
</script>
